<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: none;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
            border: 3px solid #667eea;
            border-radius: 10px;
            background: #1a1a2e;
            max-width: 100%;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-pause {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-reset {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .difficulty-selector {
            margin-top: 15px;
            text-align: center;
        }

        .difficulty-selector label {
            font-size: 14px;
            color: #333;
            margin-right: 10px;
        }

        .difficulty-selector select {
            padding: 8px 16px;
            font-size: 14px;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
            color: #333;
            cursor: pointer;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        .game-over-content h2 {
            color: #f5576c;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .game-over-content .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 移动端方向按钮 */
        .mobile-controls {
            display: none;
            margin-top: 20px;
            justify-content: center;
        }

        .direction-pad {
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 5px;
        }

        .direction-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .direction-btn:active {
            transform: scale(0.9);
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        .direction-btn.up { grid-area: up; }
        .direction-btn.down { grid-area: down; }
        .direction-btn.left { grid-area: left; }
        .direction-btn.right { grid-area: right; }

        /* 响应式设计 */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .game-container {
                padding: 15px;
            }

            h1 {
                font-size: 24px;
            }

            #gameCanvas {
                width: 100%;
                height: auto;
            }

            .mobile-controls {
                display: block;
            }

            .controls button {
                padding: 10px 16px;
                font-size: 14px;
            }
        }

        /* 吃食物动画 */
        @keyframes eatPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .eat-animation {
            animation: eatPulse 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">当前分数</div>
                <div class="score-value" id="currentScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">最高分</div>
                <div class="score-value" id="highScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startGame()">▶ 开始游戏</button>
            <button class="btn-pause" id="pauseBtn" onclick="togglePause()" disabled>⏸ 暂停</button>
            <button class="btn-reset" onclick="resetGame()">🔄 重置</button>
        </div>

        <div class="difficulty-selector">
            <label for="difficulty">难度选择：</label>
            <select id="difficulty" onchange="changeDifficulty()">
                <option value="easy">简单</option>
                <option value="medium" selected>中等</option>
                <option value="hard">困难</option>
            </select>
        </div>

        <div class="mobile-controls">
            <div class="direction-pad">
                <button class="direction-btn up" ontouchstart="handleMobileControl('up')" onclick="handleMobileControl('up')">⬆</button>
                <button class="direction-btn left" ontouchstart="handleMobileControl('left')" onclick="handleMobileControl('left')">⬅</button>
                <button class="direction-btn right" ontouchstart="handleMobileControl('right')" onclick="handleMobileControl('right')">➡</button>
                <button class="direction-btn down" ontouchstart="handleMobileControl('down')" onclick="handleMobileControl('down')">⬇</button>
            </div>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay" onclick="closeGameOver()">
        <div class="game-over-content" onclick="event.stopPropagation()">
            <h2>💀 游戏结束</h2>
            <p>你的得分</p>
            <div class="final-score" id="finalScore">0</div>
            <p id="newRecord" style="color: #f5576c; font-weight: bold; display: none;">🎉 新纪录！</p>
            <button class="btn-start" onclick="closeGameOver(); startGame();" style="margin-top: 20px;">
                🔄 再来一局
            </button>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 难度设置（速度：毫秒/帧）
        const difficultySettings = {
            easy: 200,
            medium: 150,
            hard: 100
        };

        // ==================== 游戏状态 ====================
        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isRunning = false;
        let isPaused = false;
        let currentDifficulty = 'medium';
        let isEating = false;

        // 初始化最高分显示
        document.getElementById('highScore').textContent = highScore;

        // ==================== 触摸滑动控制 ====================
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) {
            if (!isRunning || isPaused) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            // 判断滑动方向（取绝对值较大的方向）
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // 水平方向
                if (diffX > 0 && direction.x !== -1) {
                    nextDirection = { x: 1, y: 0 };
                } else if (diffX < 0 && direction.x !== 1) {
                    nextDirection = { x: -1, y: 0 };
                }
            } else {
                // 垂直方向
                if (diffY > 0 && direction.y !== -1) {
                    nextDirection = { x: 0, y: 1 };
                } else if (diffY < 0 && direction.y !== 1) {
                    nextDirection = { x: 0, y: -1 };
                }
            }
            
            e.preventDefault();
        }, { passive: false });

        // ==================== 键盘控制 ====================
        document.addEventListener('keydown', function(e) {
            if (!isRunning || isPaused) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
                case ' ':
                    togglePause();
                    break;
            }
        });

        // ==================== 移动端按钮控制 ====================
        function handleMobileControl(dir) {
            if (!isRunning || isPaused) return;

            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        // ==================== 游戏初始化 ====================
        function initGame() {
            // 初始化蛇（居中，长度 3）
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) + 1 },
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) + 2 }
            ];
            
            // 初始方向向上
            direction = { x: 0, y: -1 };
            nextDirection = { x: 0, y: -1 };
            
            score = 0;
            updateScoreDisplay();
            
            placeFood();
        }

        // ==================== 放置食物 ====================
        function placeFood() {
            let validPosition = false;
            
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                // 确保食物不会生成在蛇身上
                validPosition = !snake.some(segment => 
                    segment.x === food.x && segment.y === food.y
                );
            }
        }

        // ==================== 游戏主循环 ====================
        function gameStep() {
            if (isPaused) return;

            // 更新方向
            direction = { ...nextDirection };

            // 计算新头部位置
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 检测碰撞（墙壁）
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 检测碰撞（自身）
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            // 移动蛇
            snake.unshift(head);

            // 检测是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScoreDisplay();
                isEating = true;
                placeFood();
                
                // 播放吃食物动画
                canvas.classList.add('eat-animation');
                setTimeout(() => canvas.classList.remove('eat-animation'), 300);
            } else {
                snake.pop();
            }

            isEating = false;
            draw();
        }

        // ==================== 绘制游戏 ====================
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（可选，增加视觉效果）
            ctx.strokeStyle = '#2a2a3e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                // 蛇头颜色不同
                if (index === 0) {
                    ctx.fillStyle = '#00ff88';
                } else {
                    // 蛇身渐变效果
                    const gradient = 1 - (index / snake.length) * 0.5;
                    ctx.fillStyle = `rgba(0, 255, 136, ${gradient})`;
                }

                // 绘制圆角矩形
                const padding = 1;
                const size = gridSize - padding * 2;
                const x = segment.x * gridSize + padding;
                const y = segment.y * gridSize + padding;
                
                ctx.beginPath();
                ctx.roundRect(x, y, size, size, 5);
                ctx.fill();

                // 绘制蛇眼睛
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    if (direction.x === 1) { // 向右
                        ctx.beginPath();
                        ctx.arc(x + size - eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + size - eyeOffset, y + size - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.x === -1) { // 向左
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + eyeOffset, y + size - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y === -1) { // 向上
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + size - eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else { // 向下
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + size - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + size - eyeOffset, y + size - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });

            // 绘制食物（带发光效果）
            const foodGlow = isEating ? 15 : 10;
            ctx.shadowBlur = foodGlow;
            ctx.shadowColor = '#ff6b6b';
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // ==================== 更新分数显示 ====================
        function updateScoreDisplay() {
            document.getElementById('currentScore').textContent = score;
        }

        // ==================== 开始游戏 ====================
        function startGame() {
            if (isRunning) return;

            initGame();
            isRunning = true;
            isPaused = false;
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('pauseBtn').textContent = '⏸ 暂停';
            
            const speed = difficultySettings[currentDifficulty];
            gameLoop = setInterval(gameStep, speed);
            
            draw();
        }

        // ==================== 暂停/继续游戏 ====================
        function togglePause() {
            if (!isRunning) return;

            isPaused = !isPaused;
            
            const pauseBtn = document.getElementById('pauseBtn');
            if (isPaused) {
                pauseBtn.textContent = '▶ 继续';
            } else {
                pauseBtn.textContent = '⏸ 暂停';
            }
        }

        // ==================== 重置游戏 ====================
        function resetGame() {
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            
            isRunning = false;
            isPaused = false;
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('pauseBtn').textContent = '⏸ 暂停';
            
            initGame();
            draw();
        }

        // ==================== 游戏结束 ====================
        function gameOver() {
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            
            isRunning = false;
            
            // 更新最高分
            const isNewRecord = score > highScore;
            if (isNewRecord) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            // 显示游戏结束界面
            document.getElementById('finalScore').textContent = score;
            document.getElementById('newRecord').style.display = isNewRecord ? 'block' : 'none';
            document.getElementById('gameOverOverlay').style.display = 'flex';
            
            // 重置按钮状态
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('pauseBtn').textContent = '⏸ 暂停';
        }

        // ==================== 关闭游戏结束界面 ====================
        function closeGameOver() {
            document.getElementById('gameOverOverlay').style.display = 'none';
        }

        // ==================== 更改难度 ====================
        function changeDifficulty() {
            currentDifficulty = document.getElementById('difficulty').value;
            
            // 如果游戏正在运行，重启以应用新难度
            if (isRunning) {
                resetGame();
            }
        }

        // ==================== 初始化绘制 ====================
        initGame();
        draw();
    </script>
</body>
</html>
